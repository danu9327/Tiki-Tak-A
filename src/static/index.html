<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiki - 또래 상담 챗봇</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #FFF8F0;
            --bg-chat: #FFFFFF;
            --accent: #FF8C42;
            --accent-light: #FFD4B2;
            --accent-soft: #FFF0E5;
            --user-bubble: #FF8C42;
            --user-text: #FFFFFF;
            --bot-bubble: #F0F0F0;
            --bot-text: #333333;
            --text-primary: #2D2D2D;
            --text-secondary: #888888;
            --border: #E8E8E8;
            --danger: #FF6B6B;
            --caution: #FFD93D;
            --safe: #6BCB77;
            --shadow: rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-primary);
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: 100dvh;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px var(--shadow);
            position: relative;
        }

        /* 헤더 */
        .header {
            background: linear-gradient(135deg, #FF8C42, #FF6B35);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .header-info h1 {
            font-size: 17px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.3px;
        }

        .header-info span {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 300;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        /* 채팅 영역 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 4px;
        }

        /* 메시지 */
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: fadeSlideUp 0.3s ease-out;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-row.user {
            flex-direction: row-reverse;
        }

        .bot-avatar-small {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #FF8C42, #FF6B35);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .bubble {
            max-width: 75%;
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.55;
            word-break: break-word;
            letter-spacing: -0.2px;
        }

        .message-row.bot .bubble {
            background: var(--bot-bubble);
            color: var(--bot-text);
            border-bottom-left-radius: 6px;
        }

        .message-row.user .bubble {
            background: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 6px;
        }

        /* 시설 카드 */
        .center-card-container {
            max-width: 85%;
            animation: fadeSlideUp 0.3s ease-out;
        }

        .center-card-header {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            padding-left: 40px;
        }

        .center-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 6px;
            margin-left: 40px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .center-card .name {
            font-weight: 700;
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .center-card .detail {
            font-size: 12.5px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 3px;
        }

        .center-card .phone-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        /* 타이핑 인디케이터 */
        .typing-indicator {
            display: none;
            align-items: flex-end;
            gap: 8px;
            padding: 4px 0;
        }

        .typing-indicator.show {
            display: flex;
        }

        .typing-dots {
            background: var(--bot-bubble);
            padding: 12px 18px;
            border-radius: 18px;
            border-bottom-left-radius: 6px;
            display: flex;
            gap: 5px;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            background: #BBB;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* 입력 영역 */
        .input-area {
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: white;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .input-area textarea {
            flex: 1;
            border: 1.5px solid var(--border);
            border-radius: 22px;
            padding: 11px 18px;
            font-size: 14.5px;
            font-family: 'Noto Sans KR', sans-serif;
            resize: none;
            outline: none;
            max-height: 100px;
            line-height: 1.4;
            transition: border-color 0.2s;
            background: #FAFAFA;
        }

        .input-area textarea:focus {
            border-color: var(--accent);
            background: white;
        }

        .input-area textarea::placeholder {
            color: #BBBBBB;
        }

        .btn-send {
            width: 44px;
            height: 44px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, background 0.2s;
            flex-shrink: 0;
        }

        .btn-send:active {
            transform: scale(0.92);
        }

        .btn-send:disabled {
            background: #DDD;
            cursor: not-allowed;
        }

        /* 웰컴 메시지 */
        .welcome {
            text-align: center;
            padding: 30px 20px;
            animation: fadeSlideUp 0.5s ease-out;
        }

        .welcome-emoji {
            font-size: 52px;
            margin-bottom: 14px;
        }

        .welcome h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .welcome p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            font-weight: 300;
        }

        /* 긴급 배너 */
        .emergency-banner {
            background: linear-gradient(135deg, #FFF0E5, #FFE0CC);
            margin: 0 16px 10px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 12.5px;
            color: #CC5500;
            text-align: center;
            line-height: 1.5;
            animation: fadeSlideUp 0.4s ease-out;
        }

        .emergency-banner strong {
            font-weight: 700;
        }

        /* 날짜 구분선 */
        .date-divider {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 10px 0;
            font-weight: 300;
        }

        /* 반응형 */
        @media (min-width: 481px) {
            .app-container {
                height: 90vh;
                max-height: 800px;
                border-radius: 24px;
                overflow: hidden;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 헤더 -->
        <div class="header">
            <div class="header-left">
                <div class="avatar">🤝</div>
                <div class="header-info">
                    <h1>Tiki</h1>
                    <span>또래 상담 챗봇</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-reset" onclick="resetChat()">새 대화</button>
            </div>
        </div>

        <!-- 채팅 영역 -->
        <div class="chat-area" id="chatArea">
            <div class="welcome">
                <div class="welcome-emoji">🤝</div>
                <h2>안녕! 나는 Tiki야</h2>
                <p>편하게 얘기해줘.<br>고민이 있든 없든, 그냥 수다도 좋아!</p>
            </div>
            <div class="emergency-banner">
                <strong>긴급할 때</strong>는 <strong>1388</strong> (청소년 전화, 24시간)로 전화해줘
            </div>
        </div>

        <!-- 타이핑 인디케이터 -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="bot-avatar-small">🤝</div>
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- 입력 영역 -->
        <div class="input-area">
            <textarea id="userInput" rows="1" placeholder="여기에 편하게 적어줘..."
                      onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
            <button class="btn-send" id="btnSend" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        let sessionId = null;
        let isWaiting = false;

        // 세션 초기화
        async function initSession() {
            try {
                const res = await fetch("/api/session", { method: "POST" });
                const data = await res.json();
                sessionId = data.session_id;
            } catch (e) {
                console.error("세션 생성 실패:", e);
            }
        }

        // 메시지 전송
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text || isWaiting) return;

            // 사용자 메시지 표시
            addMessage(text, "user");
            input.value = "";
            autoResize(input);

            // 타이핑 표시
            isWaiting = true;
            document.getElementById("btnSend").disabled = true;
            showTyping(true);

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ session_id: sessionId, message: text }),
                });
                const data = await res.json();

                showTyping(false);

                // 응답 메시지들 순차 표시
                for (let i = 0; i < data.messages.length; i++) {
                    const msg = data.messages[i];
                    if (i > 0) await delay(500); // 여러 메시지면 약간의 딜레이

                    if (msg.type === "text") {
                        addMessage(msg.content, "bot");
                    } else if (msg.type === "centers") {
                        addCenterCards(msg.location, msg.centers);
                    }
                }
            } catch (e) {
                showTyping(false);
                addMessage("앗, 연결이 안 되네 ㅠ 잠시 후에 다시 시도해줘!", "bot");
            }

            isWaiting = false;
            document.getElementById("btnSend").disabled = false;
            input.focus();
        }

        // 메시지 추가
        function addMessage(text, sender) {
            const chatArea = document.getElementById("chatArea");
            const row = document.createElement("div");
            row.className = `message-row ${sender}`;

            if (sender === "bot") {
                row.innerHTML = `
                    <div class="bot-avatar-small">🤝</div>
                    <div class="bubble">${escapeHtml(text)}</div>
                `;
            } else {
                row.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            }

            chatArea.appendChild(row);
            scrollToBottom();
        }

        // 시설 카드 추가
        function addCenterCards(location, centers) {
            const chatArea = document.getElementById("chatArea");
            const container = document.createElement("div");
            container.className = "center-card-container";
            container.innerHTML = `<div class="center-card-header">📍 ${escapeHtml(location)} 근처 지원시설</div>`;

            centers.forEach(c => {
                const card = document.createElement("div");
                card.className = "center-card";
                card.innerHTML = `
                    <div class="name">${escapeHtml(c.name)}</div>
                    <div class="detail">📍 ${escapeHtml(c.address)}</div>
                    <div class="detail">📞 <a href="tel:${c.phone}" class="phone-link">${escapeHtml(c.phone)}</a></div>
                `;
                container.appendChild(card);
            });

            chatArea.appendChild(container);
            scrollToBottom();
        }

        // 유틸리티
        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function showTyping(show) {
            const el = document.getElementById("typingIndicator");
            el.classList.toggle("show", show);
            if (show) scrollToBottom();
        }

        function scrollToBottom() {
            const chatArea = document.getElementById("chatArea");
            setTimeout(() => {
                chatArea.scrollTop = chatArea.scrollHeight;
            }, 50);
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function handleKeydown(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = "auto";
            el.style.height = Math.min(el.scrollHeight, 100) + "px";
        }

        async function resetChat() {
            if (!confirm("대화를 새로 시작할까?")) return;
            try {
                await fetch("/api/reset", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ session_id: sessionId }),
                });
            } catch (e) {}

            // UI 초기화
            const chatArea = document.getElementById("chatArea");
            chatArea.innerHTML = `
                <div class="welcome">
                    <div class="welcome-emoji">🤝</div>
                    <h2>안녕! 나는 Tiki야</h2>
                    <p>편하게 얘기해줘.<br>고민이 있든 없든, 그냥 수다도 좋아!</p>
                </div>
                <div class="emergency-banner">
                    <strong>긴급할 때</strong>는 <strong>1388</strong> (청소년 전화, 24시간)로 전화해줘
                </div>
            `;
            await initSession();
        }

        // 앱 시작
        initSession();
        document.getElementById("userInput").focus();
    </script>
</body>
</html>
